name: syntx

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: syntx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - syntx

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syntx-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app:ro
    networks:
      - syntx

  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    container_name: syntx-ollama
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - syntx

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: syntx-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - syntx

networks:
  syntx:
    driver: bridge

volumes:
  postgres_data:
    name: syntx_postgres_data
  ollama_data:
    name: syntx_ollama_data
